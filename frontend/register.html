<!DOCTYPE html>
<html>
<head>
<title>Register Student Face</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

video{
border:2px solid black;
margin-top:10px;
}

input{
padding:10px;
margin:5px;
width:80%;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

#status{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Register Student Face</h2>

<input id="name" placeholder="Student Name"><br>
<input id="roll" placeholder="Roll Number"><br>

<video id="video" width="400" autoplay></video>

<br>

<button onclick="register()">Register Face</button>

<p id="status"></p>

</div>
<div class="nav">
<button onclick="location.href='attendance.html'">Mark Attendance</button>
<button onclick="location.href='dashboard.html'">Dashboard</button>

</div>

<script>

const video = document.getElementById("video")
const statusText = document.getElementById("status")

// open webcam
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream)
.catch(err => statusText.innerText="Camera not accessible")

// capture frame
async function captureImage(){

const canvas = document.createElement("canvas")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

const ctx = canvas.getContext("2d")
ctx.drawImage(video,0,0)

return new Promise(resolve=>{
canvas.toBlob(blob=>{
resolve(blob)
})
})

}

// register student
async function register(){

let name = document.getElementById("name").value
let roll = document.getElementById("roll").value

if(name=="" || roll==""){
statusText.innerText="Enter name and roll number"
return
}

statusText.innerText="Capturing face..."

let blob = await captureImage()

let form = new FormData()

form.append("name",name)
form.append("roll",roll)
form.append("file",blob)

let res = await fetch("http://localhost:8000/register",{
method:"POST",
body:form
})

let data = await res.json()

statusText.innerText = data.message || data.error

}

</script>

</body>
</html>
