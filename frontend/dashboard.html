<!DOCTYPE html>
<html>
<head>
<title>Attendance Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:700px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th, td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#333;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.nav{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Attendance Records</h2>

<button onclick="loadAttendance()">Load Attendance</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div class="nav">
<button onclick="location.href='register.html'">Register</button>
<button onclick="location.href='attendance.html'">Mark Attendance</button>
</div>

</div>

<script>

async function loadAttendance(){

let res = await fetch("http://localhost:8000/attendance")

let data = await res.json()

let html=""

data.forEach(a=>{

html += `
<tr>
<td>${a.id}</td>
<td>${a.name}</td>
<td>${a.date}</td>
<td>${a.time}</td>
<td>${a.status}</td>
</tr>
`

})

document.getElementById("table").innerHTML = html

}

</script>

</body>
</html>
